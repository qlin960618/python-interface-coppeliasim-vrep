name: Update Submodules

on:
  schedule:
    - cron: '0 3 */5 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-submodules-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-submodules:
    name: Update submodules and test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          submodules: recursive

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Python submodule from tracking branch
        id: update
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive submodules/dqrobotics/python
          git submodule update --remote submodules/dqrobotics/python

          if git diff --quiet --submodule=short -- submodules/dqrobotics/python; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No Python submodule update found."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --submodule=short -- submodules/dqrobotics/python
          fi

      - name: Set up Python
        if: steps.update.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install compilation dependencies
        if: steps.update.outputs.has_changes == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel setuptools-git-versioning

      - name: Build wheel
        if: steps.update.outputs.has_changes == 'true'
        run: |
          python setup.py bdist_wheel

      - name: Run minimal test
        if: steps.update.outputs.has_changes == 'true'
        run: |
          cd .github/scripts/
          chmod +x basic_test.sh
          ./basic_test.sh

      - name: Commit and push submodule updates
        if: steps.update.outputs.has_changes == 'true'
        run: |
          git add submodules/dqrobotics/python
          git commit -m "Update dqrobotics Python submodule"
          git push
